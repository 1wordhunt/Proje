<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İngilizce Alfabetik Sözlük - Harun Sürücü</title>
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #4f46e5;
            --bg: #f3f4f6;
            --text: #1f2937;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            padding: 30px;
            position: relative;
        }

        .info-box {
            background: #eef2ff;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 25px;
            border-left: 6px solid var(--primary);
        }

        .info-box p { margin: 8px 0; font-weight: 500; }
        .info-box span { color: var(--secondary); font-weight: bold; }

        .alphabet-header {
            text-align: center;
            font-size: 3rem;
            font-weight: 900;
            color: var(--primary);
            margin: 10px 0;
            text-transform: uppercase;
        }

        /* Sayfa Geçiş Animasyonu */
        .word-list-container {
            min-height: 450px;
        }

        .page-animation {
            animation: slideFade 0.6s ease-out;
        }

        @keyframes slideFade {
            0% { opacity: 0; transform: scale(0.95) translateY(10px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .word-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 15px;
            border-bottom: 1px solid #f3f4f6;
            transition: 0.2s;
        }

        .word-item:hover { background: #f9fafb; border-radius: 8px; }

        .en { font-weight: bold; color: var(--secondary); font-size: 1.1rem; }
        .tr { color: #6b7280; font-style: italic; }

        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 30px;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(99, 102, 241, 0.3);
            transition: 0.3s;
        }

        button:hover:not(:disabled) { background: var(--secondary); transform: translateY(-2px); }
        button:disabled { background: #d1d5db; box-shadow: none; cursor: not-allowed; }

        .progress { font-weight: bold; color: #9ca3af; }
    </style>
</head>
<body>

<div class="container">
    <div class="info-box">
        <p>Öğrenci: <span>Harun Sürücü</span></p>
        <p>Numara: <span>[Buraya Numaranı Yaz]</span></p>
        <p>Ders: <span>İngilizce</span></p>
        <p>Öğretmen: <span>Emel Bozbay</span></p>
    </div>

    <div id="word-list-container" class="word-list-container">
        <div class="alphabet-header" id="current-letter">A</div>
        <div id="words" class="page-animation">
            </div>
    </div>

    <div class="nav">
        <button id="prevBtn" onclick="changePage(-1)">Geri</button>
        <span class="progress" id="page-info">A / Z</span>
        <button id="nextBtn" onclick="changePage(1)">İleri</button>
    </div>
</div>

        ]
    };

    const alphabet = Object.keys(dictionary);
    let currentIdx = 0;

    function display() {
        const letter = alphabet[currentIdx];
        const wordsDiv = document.getElementById('words');
        const letterHeader = document.getElementById('current-letter');
        const pageInfo = document.getElementById('page-info');

        // Animasyonu resetle
        wordsDiv.classList.remove('page-animation');
        void wordsDiv.offsetWidth; 
        wordsDiv.classList.add('page-animation');

        letterHeader.innerText = letter;
        wordsDiv.innerHTML = "";

        dictionary[letter].forEach(item => {
            wordsDiv.innerHTML += `
                <div class="word-item">
                    <span class="en">${item.en}</span>
                    <span class="tr">${item.tr}</span>
                </div>`;
        });

        pageInfo.innerText = `${letter} / Z`;
        document.getElementById('prevBtn').disabled = (currentIdx === 0);
        document.getElementById('nextBtn').disabled = (currentIdx === alphabet.length - 1);
    }

    function changePage(dir) {
        currentIdx += dir;
        display();
        window.scrollTo(0, 0);
    }

    display();
